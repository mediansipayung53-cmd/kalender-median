<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Survival Voxel - Roblox Style Prototype</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000;
        }

        /* UI OVERLAY */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #instructions {
            color: white;
            text-align: center;
            cursor: pointer;
        }

        #title {
            font-size: 50px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 20px;
            color: #4CAF50;
        }

        .controls {
            font-size: 20px;
            line-height: 1.5;
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #fff;
        }

        /* CROSSHAIR */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 5;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { width: 2px; height: 20px; left: 9px; }
        #crosshair::after { width: 20px; height: 2px; top: 9px; }

        /* HUD */
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: white;
            font-size: 18px;
            pointer-events: none;
            display: flex;
            gap: 20px;
        }
        .stat-box {
            background: rgba(0,0,0,0.5);
            padding: 10px 20px;
            border-radius: 5px;
            border-left: 5px solid;
        }
        #health-box { border-color: #ff4444; }
        #stamina-box { border-color: #44aaff; }

    </style>
</head>
<body>

    <div id="crosshair"></div>
    <div id="hud">
        <div id="health-box" class="stat-box">HP: <span id="hp-val">100</span>%</div>
        <div id="stamina-box" class="stat-box">Stamina: <span id="sta-val">100</span>%</div>
        <div class="stat-box" style="border-color: yellow;">Blocks: <span id="block-count">0</span></div>
    </div>

    <div id="blocker">
        <div id="instructions">
            <div id="title">VOXEL SURVIVAL 3D</div>
            <div class="controls">
                Klik untuk Memulai<br><br>
                (W, A, S, D) = Bergerak<br>
                (SPASI) = Lompat<br>
                (SHIFT) = Lari<br>
                (KLIK KIRI) = Hancurkan Blok<br>
                (KLIK KANAN) = Pasang Blok<br>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://unpkg.com/three@0.126.1/build/three.module.js';
        import { PointerLockControls } from 'https://unpkg.com/three@0.126.1/examples/jsm/controls/PointerLockControls.js';

        // --- KONFIGURASI GLOBAL ---
        let camera, scene, renderer, controls;
        const objects = []; // Array untuk menyimpan semua blok agar bisa dideteksi
        let raycaster; // Untuk "menembak" garis pandangan (buat hancurkan/pasang blok)

        // Variabel Gerakan
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;
        let isSprinting = false;

        // Variabel Physics (Sederhana)
        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        // Game State
        let playerHP = 100;
        let playerStamina = 100;
        let blocksCollected = 0;

        // Warna Blok
        const colors = [0xffffff, 0x888888, 0x8B4513, 0x228B22, 0x0000FF]; // Putih, Abu, Coklat, Hijau, Biru

        init();
        animate();

        function init() {
            // 1. SETUP SCENE
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // Warna langit biru muda
            scene.fog = new THREE.Fog(0x87CEEB, 0, 750); // Kabut agar terlihat luas & realistis

            // 2. SETUP CAMERA
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 10; // Posisi awal player

            // 3. PENCAHAYAAN (LIGHTING)
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0xffffff, 0.75);
            hemiLight.position.set(0, 50, 0);
            scene.add(hemiLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(100, 200, 100);
            dirLight.castShadow = true;
            // Optimasi bayangan
            dirLight.shadow.mapSize.width = 2048;
            dirLight.shadow.mapSize.height = 2048;
            scene.add(dirLight);

            // 4. KONTROL (POINTER LOCK)
            controls = new PointerLockControls(camera, document.body);

            const blocker = document.getElementById('blocker');
            const instructions = document.getElementById('instructions');

            instructions.addEventListener('click', function () {
                controls.lock();
            });

            controls.addEventListener('lock', function () {
                instructions.style.display = 'none';
                blocker.style.display = 'none';
            });

            controls.addEventListener('unlock', function () {
                blocker.style.display = 'flex';
                instructions.style.display = '';
            });

            scene.add(controls.getObject());

            // 5. INPUT KEYBOARD
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = true; break;
                    case 'Space':
                        if (canJump === true) velocity.y += 350; // Kekuatan lompat
                        canJump = false;
                        break;
                    case 'ShiftLeft': isSprinting = true; break;
                }
            };

            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = false; break;
                    case 'ShiftLeft': isSprinting = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 6. INTERAKSI MOUSE (RAYCASTER - BUILDING SYSTEM)
            raycaster = new THREE.Raycaster();
            document.addEventListener('mousedown', onMouseDown);

            // 7. DUNIA (WORLD GENERATION)
            // Kita buat lantai dasar dan beberapa objek acak
            const floorGeometry = new THREE.PlaneGeometry(2000, 2000, 100, 100);
            floorGeometry.rotateX(-Math.PI / 2);

            // Membuat variasi terrain sederhana (seperti bukit)
            const positionAttribute = floorGeometry.attributes.position;
            for ( let i = 0; i < positionAttribute.count; i ++ ) {
                const x = positionAttribute.getX( i );
                const z = positionAttribute.getZ( i );
                // Menggunakan Math.sin untuk membuat gelombang (bukit)
                const y = (Math.sin(x / 50) * Math.cos(z / 50)) * 20; 
                positionAttribute.setY( i, y );
            }
            floorGeometry.computeVertexNormals();

            const floorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x228B22, // Rumput hijau
                roughness: 0.8 
            }); 
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.receiveShadow = true;
            scene.add(floor);
            
            // Masukkan lantai ke array objects agar kita tidak tembus ke bawah tanah
            // Catatan: Raycasting collision vs Plane agak berat, jadi kita pakai logika bounding box sederhana untuk player nanti.
            // Namun untuk "menaruh blok", kita butuh ini.
            objects.push(floor);

            // GENERATE BLOK ACAK (VOXEL)
            const boxGeometry = new THREE.BoxGeometry(20, 20, 20);
            
            // Loop untuk membuat 300 blok acak
            for (let i = 0; i < 300; i++) {
                // Pilih warna acak
                const color = new THREE.Color();
                color.setHex(colors[Math.floor(Math.random() * colors.length)]);

                const boxMaterial = new THREE.MeshStandardMaterial({ color: color });
                const box = new THREE.Mesh(boxGeometry, boxMaterial);
                
                // Posisi Acak
                box.position.x = Math.floor(Math.random() * 20 - 10) * 40;
                box.position.y = Math.floor(Math.random() * 20) * 20 + 10;
                box.position.z = Math.floor(Math.random() * 20 - 10) * 40;

                box.castShadow = true;
                box.receiveShadow = true;

                scene.add(box);
                objects.push(box);
            }

            // 8. RENDERER SETUP
            renderer = new THREE.WebGLRenderer({ antialias: true }); // Antialias agar tidak bergerigi
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true; // Aktifkan bayangan
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize);
        }

        // --- FUNGSI INTERAKSI KLIK MOUSE ---
        function onMouseDown(event) {
            if (!controls.isLocked) return;

            // Set raycaster dari tengah layar
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);

            // Cari objek yang kena cursor (maksimal jarak 100 unit)
            const intersects = raycaster.intersectObjects(objects);

            if (intersects.length > 0) {
                const intersect = intersects[0];

                // Cek jarak
                if(intersect.distance > 80) return; // Tidak bisa jangkau kalau terlalu jauh

                if (event.button === 0) { 
                    // KLIK KIRI: HANCURKAN
                    // Jangan hapus lantai utama (plane geometry)
                    if (intersect.object.geometry.type === 'BoxGeometry') {
                        scene.remove(intersect.object);
                        objects.splice(objects.indexOf(intersect.object), 1);
                        
                        // Update UI
                        blocksCollected++;
                        document.getElementById('block-count').innerText = blocksCollected;
                    }
                } else if (event.button === 2) {
                    // KLIK KANAN: PASANG BLOK
                    const voxel = new THREE.Mesh(
                        new THREE.BoxGeometry(20, 20, 20),
                        new THREE.MeshStandardMaterial({ map: null, color: 0x8B4513 }) // Warna Kayu
                    );
                    
                    // Tempel di sisi objek yang diklik
                    voxel.position.copy(intersect.point).add(intersect.face.normal);
                    voxel.position.divideScalar(20).floor().multiplyScalar(20).addScalar(10);
                    
                    voxel.castShadow = true;
                    voxel.receiveShadow = true;
                    scene.add(voxel);
                    objects.push(voxel);
                    
                    // Kurangi inventory (simulasi)
                    if(blocksCollected > 0) {
                        blocksCollected--;
                        document.getElementById('block-count').innerText = blocksCollected;
                    }
                }
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- GAME LOOP (ANIMATION) ---
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();

            if (controls.isLocked === true) {
                // Hitung Delta Time
                const delta = (time - prevTime) / 1000;

                // Simulasi Fisika Sederhana
                velocity.x -= velocity.x * 10.0 * delta; // Friksi/Gesekan X
                velocity.z -= velocity.z * 10.0 * delta; // Friksi/Gesekan Z
                velocity.y -= 9.8 * 100.0 * delta; // Gravitasi

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // Agar jalan miring tidak lebih cepat

                // Kecepatan lari vs jalan
                const speed = isSprinting ? 1200.0 : 400.0;
                
                // Mekanisme Stamina
                if (isSprinting && (moveForward || moveBackward || moveLeft || moveRight)) {
                    playerStamina = Math.max(0, playerStamina - 0.5);
                } else if (playerStamina < 100) {
                    playerStamina += 0.2;
                }
                document.getElementById('sta-val').innerText = Math.floor(playerStamina);

                // Jika stamina habis, tidak bisa lari
                if (playerStamina <= 0) velocity.z = Math.min(velocity.z, 400 * delta);


                if (moveForward || moveBackward) velocity.z -= direction.z * speed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * speed * delta;

                // Terapkan gerakan ke kontrol
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // Collision Detection Sederhana dengan Lantai (Y Position)
                // Kita gunakan Raycaster ke arah bawah untuk mendeteksi tanah
                const raycasterDown = new THREE.Raycaster(
                    controls.getObject().position, 
                    new THREE.Vector3(0, -1, 0), 
                    0, 
                    20 // Tinggi player
                );
                const intersectsDown = raycasterDown.intersectObjects(objects);

                // Logika Ground Check
                // Secara default kita anggap lantai ada di Y = 10 (dari world gen awal di 0)
                let groundY = 10; 
                
                // Jika berdiri di atas kotak
                if(intersectsDown.length > 0) {
                    // Ambil titik tertinggi dari objek di bawah
                    groundY = intersectsDown[0].point.y + 10; 
                    velocity.y = Math.max(0, velocity.y);
                    canJump = true;
                } else if (controls.getObject().position.y <= 10) {
                    // Jika menyentuh bedrock/lantai dasar
                    velocity.y = Math.max(0, velocity.y);
                    canJump = true;
                }

                controls.getObject().position.y += (velocity.y * delta);

                // Cegah jatuh ke void
                if (controls.getObject().position.y < 10) {
                    velocity.y = 0;
                    controls.getObject().position.y = 10;
                    canJump = true;
                }
            }

            prevTime = time;

            renderer.render(scene, camera);
        }

    </script>
</body>
</html>
